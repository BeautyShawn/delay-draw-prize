<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>活动详情 - 用户端</title>
  <link rel="stylesheet" href="/assets/mobile.css">
</head>
<body>
  <div class="mobile-shell">
    <div class="page">
      <section class="hero">
        <div id="heroEyebrow" class="eyebrow">活动详情</div>
        <h1 id="heroTitle">活动加载中...</h1>
        <p id="heroDesc">正在同步后台已创建活动，请稍候。</p>
        <div class="directory" data-mobile-directory></div>
      </section>

      <section class="card">
        <span id="statusBadge" class="status-badge status-pending">-</span>
        <h2 class="section-title">活动信息</h2>
        <div id="activityInfo" class="subtle">-</div>
        <div class="metrics">
          <div class="metric"><strong id="metricParticipants">-</strong><span>已参与人数</span></div>
          <div class="metric"><strong id="metricEntries">-</strong><span>累计抽奖码</span></div>
          <div class="metric"><strong id="metricMyEntries">-</strong><span>我的抽奖码</span></div>
        </div>
      </section>

      <section class="card">
        <h2 class="section-title">奖品墙</h2>
        <div id="prizeWall" class="prize-wall"></div>
      </section>

      <section class="card">
        <h2 class="section-title">参与任务</h2>
        <div id="taskList" class="benefit-list"></div>
      </section>

      <section class="card">
        <h2 class="section-title">我的抽奖码</h2>
        <div id="codeList" class="code-list"></div>
        <div class="cta-row">
          <a id="primaryAction" class="btn btn-primary" href="/m-activity-list.html">返回活动列表</a>
        </div>
      </section>
    </div>
  </div>
  <script src="/assets/mobile.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const activityId = params.get("id");
    const userId = mobileApp.getUserId();
    let currentActivity = null;

    function getStatusClass(status) {
      if (status === "已中奖") return "status-win";
      if (status === "未中奖") return "status-lost";
      return "status-pending";
    }

    function renderDetail(activity) {
      currentActivity = activity;
      document.title = `${activity.name} - 活动详情`;
      document.getElementById("heroEyebrow").textContent = activity.userStatus;
      document.getElementById("heroTitle").textContent = activity.subtitle || activity.name;
      document.getElementById("heroDesc").textContent = activity.description || "该活动已由后台创建，可在此查看奖品、任务和我的参与情况。";
      const badge = document.getElementById("statusBadge");
      badge.className = `status-badge ${getStatusClass(activity.userStatus)}`;
      badge.textContent = activity.userStatus;

      document.getElementById("activityInfo").textContent = `开奖时间：${activity.drawTimeLabel} · 参与限制：${activity.joinLimit}`;
      document.getElementById("metricParticipants").textContent = activity.metrics.participants;
      document.getElementById("metricEntries").textContent = activity.metrics.totalEntries;
      document.getElementById("metricMyEntries").textContent = activity.metrics.userEntries;

      document.getElementById("prizeWall").innerHTML = activity.prizes.length
        ? activity.prizes.map((prize) => `
          <div class="prize-item">
            <div class="prize-rank">${prize.level >= 99 ? "参" : prize.level}</div>
            <div class="prize-meta">
              <strong>${prize.label}</strong>
              <div class="subtle">类型：${prize.type} · 数量：${prize.quantity}</div>
            </div>
          </div>
        `).join("")
        : '<div class="benefit-item"><div class="subtle">暂无奖品配置</div></div>';

      document.getElementById("taskList").innerHTML = activity.tasks.length
        ? activity.tasks.map((task) => `<div class="benefit-item"><strong>${task}</strong><div class="subtle">完成后可获得抽奖码。</div></div>`).join("")
        : '<div class="benefit-item"><div class="subtle">后台暂未配置参与任务</div></div>';

      document.getElementById("codeList").innerHTML = activity.userEntries.length
        ? activity.userEntries.map((entry) => `
          <div class="code-item">
            <strong>${entry.code}</strong>
            <div class="subtle">来源：${entry.source} · ${entry.obtainedAtLabel}</div>
            <div class="subtle">状态：${entry.status}${entry.prizeName ? ` · ${entry.prizeName}` : ""}</div>
          </div>
        `).join("")
        : '<div class="benefit-item"><div class="subtle">你还没有参与该活动，完成任务后即可获得抽奖码。</div></div>';

      const primaryAction = document.getElementById("primaryAction");
      primaryAction.textContent = activity.ctaText;
      if (activity.userStatus === "已中奖") {
        primaryAction.href = `/m-redeem.html?activityId=${activity.id}&userId=${encodeURIComponent(userId)}`;
        primaryAction.onclick = null;
      } else if (activity.userStatus === "待开奖") {
        primaryAction.href = "#";
        primaryAction.onclick = joinActivity;
      } else if (activity.userStatus === "未中奖") {
        primaryAction.href = `/m-activity-list.html?userId=${encodeURIComponent(userId)}`;
        primaryAction.onclick = null;
      } else {
        primaryAction.href = "#";
        primaryAction.onclick = joinActivity;
      }
    }

    async function loadActivity() {
      const activity = await mobileApp.api.get(`/api/mobile/activities/${activityId}?userId=${encodeURIComponent(userId)}`);
      renderDetail(activity);
    }

    async function joinActivity(event) {
      event.preventDefault();
      if (!currentActivity) {
        return;
      }
      try {
        const payload = await mobileApp.api.post(`/api/mobile/activities/${activityId}/join`, {
          userId,
          source: currentActivity.tasks[0] || "用户端参与"
        });
        renderDetail(payload.activity);
        window.alert(`参与成功，获得抽奖码 ${payload.entry.code}`);
      } catch (error) {
        window.alert(error.message);
      }
    }

    if (!activityId) {
      document.getElementById("heroTitle").textContent = "活动不存在";
      document.getElementById("heroDesc").textContent = "未找到活动 ID，请返回活动列表重新选择。";
    } else {
      loadActivity()
        .catch(() => {
          document.getElementById("heroTitle").textContent = "活动加载失败";
          document.getElementById("heroDesc").textContent = "活动可能已删除，或接口暂时不可用。";
        });
    }
  </script>
</body>
</html>
